services:
  - type: web
    name: akilli-ev-enerji-tahmin-sistemi
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: Akıllı Ev Enerji Tüketimi Tahmin Sistemi
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        value: sqlite:///./runtime/data/smart_home_energy.db
      - key: MODEL_PATH
        value: ./saved_models/best_model.joblib
      - key: PREPROCESSOR_PATH
        value: ./saved_models/preprocessor.joblib
      - key: DATASET_PATH
        value: ./data/energy_consumption.csv
